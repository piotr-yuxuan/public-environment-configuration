<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Map "monospace" to Iosevka Nerd Font Mono for CLI tools (starship, etc.).
       binding="same" is required to override NixOS defaults which also
       use binding="same" so a weak (default) binding would lose. -->
  <alias binding="same">
    <family>monospace</family>
    <prefer><family>Iosevka Nerd Font Mono</family></prefer>
  </alias>
</fontconfig>
