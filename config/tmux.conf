# True-colour passthrough to the outer terminal
set -as terminal-overrides ",*:Tc"

# OSC 52 relay: let tmux pass clipboard operations through to the outer terminal
set -s set-clipboard on

# vi-mode selection bindings (complements keyMode = "vi" set in home/base.nix)
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy selection to the system clipboard on y (platform resolved at session start)
if-shell "uname | grep -q Darwin" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'"

# Prompt navigation via OSC 133 marks emitted by the zsh integration in
# config/after.zshrc.  In copy mode { and } also jump between prompts.
bind-key Up   copy-mode \; send-keys -X previous-prompt
bind-key Down copy-mode \; send-keys -X next-prompt

# Pane splits that preserve the current working directory
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
